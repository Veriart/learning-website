<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Membuat tampilan responsive di perangkat mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Paragraph</title>

    <style>
      /* Mengatur tampilan dasar halaman */
      body {
        font-family: Arial, sans-serif; /* Mengubah font default browser */
        background-color: #f4f4f4; /* Warna latar belakang halaman */
        padding: 40px; /* Memberi jarak antara konten dan tepi layar */
      }

      /* Mengatur tampilan paragraf */
      p {
        background-color: white; /* Memberi background agar paragraf terlihat seperti card */
        padding: 15px; /* Memberi ruang di dalam paragraf */
        margin-bottom: 15px; /* Memberi jarak antar paragraf */
        border-left: 5px solid #3498db; /* Garis di kiri paragraf untuk penanda visual */
        border-radius: 5px; /* Membuat sudut sedikit melengkung */
        line-height: 1.6; /* Mengatur jarak antar baris agar lebih mudah dibaca */
      }

      /* Efek saat mouse diarahkan ke paragraf */
      p:hover {
        background-color: #ecf6ff; /* Warna berubah ketika mouse diarahkan */
      }
    </style>
  </head>
  <body>
    <!-- Tag <p> digunakan untuk membuat paragraf teks -->
    <p>This is a simple paragraph.</p>

    <!-- Setiap tag <p> otomatis berada di baris baru -->
    <p>This is a simple paragraph.</p>

    <!-- Digunakan untuk menampilkan teks dalam bentuk paragraf -->
    <p>This is a simple paragraph.</p>
  </body>
</html>
