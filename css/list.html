<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Membuat tampilan responsive di perangkat mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>List</title>

    <style>
      /* Mengatur tampilan dasar halaman */
      body {
        font-family: Arial, sans-serif; /* Mengganti font default browser */
        background-color: #f4f4f4; /* Warna latar belakang halaman */
        padding: 40px; /* Memberi jarak dari tepi layar */
      }

      /* Mengatur tampilan judul */
      h1 {
        color: #2c3e50; /* Memberi warna pada heading */
        margin-top: 30px; /* Memberi jarak antar bagian */
      }

      /* Mengatur semua list */
      ul,
      ol {
        background: white; /* Memberi background agar terlihat seperti card */
        padding: 20px; /* Memberi ruang di dalam list */
        border-radius: 8px; /* Membuat sudut kotak sedikit melengkung */
        width: 250px; /* Mengatur lebar list */
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Memberi bayangan */
      }

      /* Mengatur setiap item list */
      li {
        padding: 5px 0; /* Memberi jarak antar item */
      }

      /* Efek saat mouse diarahkan ke item */
      li:hover {
        color: #3498db; /* Warna teks berubah saat hover */
        cursor: pointer; /* Mengubah cursor menjadi pointer */
      }
    </style>
  </head>
  <body>
    <!-- Judul untuk Unordered List -->
    <h1>Unordered List</h1>

    <!-- Unordered List (list tanpa urutan angka) -->
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>

    <!-- Judul untuk Ordered List -->
    <h1>Ordered List</h1>

    <!-- Ordered List (list dengan urutan angka) -->
    <ol>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ol>
  </body>
</html>
