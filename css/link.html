<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Membuat halaman responsive di perangkat mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Link</title>

    <style>
      /* Mengatur tampilan dasar halaman */
      body {
        font-family: Arial, sans-serif; /* Mengganti font default browser */
        background-color: #f4f4f4; /* Warna latar belakang halaman */
        padding: 40px; /* Memberi jarak dari tepi layar */
      }

      /* Mengatur semua elemen link */
      a {
        display: block; /* Membuat setiap link berada di baris baru */
        margin-bottom: 10px; /* Memberi jarak antar link */
        text-decoration: none; /* Menghilangkan garis bawah default */
        color: white; /* Warna teks */
        background-color: #3498db; /* Warna background link */
        padding: 10px 15px; /* Memberi ruang dalam link */
        border-radius: 5px; /* Membuat sudut kotak melengkung */
        width: 200px; /* Lebar link */
      }

      /* Efek saat mouse diarahkan ke link */
      a:hover {
        background-color: #2980b9; /* Warna berubah saat hover */
      }

      /* Efek saat link sudah pernah dikunjungi */
      a:visited {
        background-color: #8e44ad; /* Warna berbeda untuk link yang sudah dibuka */
      }
    </style>
  </head>
  <body>
    <!-- Link menuju website eksternal -->
    <a href="https://www.google.com">Visit Google</a>

    <!-- Link menuju file HTML lain dalam project yang sama -->
    <a href="paragraph.html">Visit Paragraph</a>

    <!-- Link menuju file HTML lain dalam project -->
    <a href="struktur_utama_html.html">Struktur Utama HTML</a>
  </body>
</html>
