<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Membuat tampilan website responsive pada perangkat mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Header</title>

    <style>
      /* Mengatur tampilan dasar halaman */
      body {
        font-family: Arial, sans-serif; /* Mengganti font default browser */
        background-color: #f4f4f4; /* Memberi warna latar belakang halaman */
        padding: 40px; /* Memberi jarak antara isi halaman dan tepi layar */
      }

      /* Mengatur semua heading sekaligus (h1 sampai h6) */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin-bottom: 10px; /* Memberi jarak antar heading */
      }

      /* Styling khusus untuk h1 (judul utama) */
      h1 {
        color: #2c3e50; /* Warna teks lebih gelap untuk judul utama */
        border-bottom: 3px solid #3498db; /* Garis bawah untuk memperjelas judul */
        padding-bottom: 10px; /* Jarak antara teks dan garis bawah */
      }

      /* Styling untuk h2 */
      h2 {
        color: #34495e; /* Warna sedikit lebih terang dari h1 */
      }

      /* Styling untuk h3 */
      h3 {
        color: #555; /* Warna abu untuk menunjukkan hierarki lebih rendah */
      }

      /* Styling untuk h4 */
      h4 {
        color: #666;
      }

      /* Styling untuk h5 */
      h5 {
        color: #777;
      }

      /* Styling untuk h6 */
      h6 {
        color: #888;
        font-style: italic; /* Membuat teks miring agar terlihat berbeda */
      }
    </style>
  </head>
  <body>
    <!-- h1 biasanya digunakan untuk judul utama halaman -->
    <h1>This is a Header</h1>

    <!-- h2 sampai h6 digunakan untuk subjudul dengan tingkat kepentingan berbeda -->
    <h2>This is a Subheader</h2>
    <h3>This is a Subheader</h3>
    <h4>This is a Subheader</h4>
    <h5>This is a Subheader</h5>
    <h6>This is a Subheader</h6>
  </body>
</html>
